name: PR workflow
permissions: {}
on:
  pull_request:
    types: [synchronize, opened, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-is-destination-branch-protected:
    name: check-is-destination-branch-protected
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1

        # "base_ref" is the target branch of the pull request (https://docs.github.com/en/actions/learn-github-actions/contexts#github-context)
        if: ${{ github.base_ref == 'main' }}

        with:
          script: |
            core.setFailed("PRs must not target 'main'. Please target 'development' or a feature branch instead.")
