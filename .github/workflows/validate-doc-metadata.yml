name: Validate Documentation Metadata

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'

  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read # to checkout the repository

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-doc-metadata:
    name: Validate Doc Metadata
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo content
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: validate metadata
        # Intentionally unpinned: the AWS Docs team releases validation rule
        # updates frequently, and we want to pick them up without having to
        # bump a pinned SHA every time. The other actions in this repo are
        # pinned to commit SHAs; treat this one as a deliberate exception.
        uses: awsdocs/aws-doc-sdk-examples-tools@main
